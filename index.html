<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Kriptex Trading — Login</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth">
  <div class="page">
    <header class="brand">Kriptex Trading</header>

    <main class="center">
      <form id="loginForm" class="card" autocomplete="off" aria-label="Login form">
        <h2 class="card-title">Secure Login</h2>
        <p class="hint">Enter your password to access your dashboard</p>
        <label for="password" class="sr-only">Password</label>
        <input id="password" name="password" type="password" placeholder="Password" required autofocus>
        <button type="submit" id="loginBtn" class="btn">Login</button>
      </form>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
